<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YZ Akıllı Tarım Yönetim Merkezi</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PAHO MQTT - Alternatif CDN -->
    <script src="https://cdn.jsdelivr.net/npm/paho-mqtt@1.1.0/paho-mqtt-min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { color: #1e3c72; margin-bottom: 5px; }
        .status-bar { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #2a5298; }
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #6c757d; }
        .card p { margin: 0; font-size: 22px; font-weight: bold; color: #333; }
        .yz-card { background: #fff9db; border-left: 5px solid #f59f00; grid-column: span 2; padding: 15px; border-radius: 8px; text-align: left; }
        .kontrol-card { background: #f1f3f5; border-left: 5px solid #495057; grid-column: span 2; padding: 15px; border-radius: 8px; text-align: center; }
        .grafik-card { background: #ffffff; border: 1px solid #ced4da; grid-column: span 2; padding: 15px; border-radius: 8px; }
        .manuel-bildirim { background: #ffe3e3; border-left: 5px solid #e03131; grid-column: span 2; padding: 10px; border-radius: 8px; text-align: center; display: none; }
        select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ced4da; font-size: 16px; margin-top: 10px; }
        button { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #2a5298; }
        .btn-ac { background-color: #2b8a3e; margin-bottom: 5px; }
        .btn-ac:hover { background-color: #237032; }
        .btn-kapat { background-color: #e63946; }
        .btn-kapat:hover { background-color: #b82e38; }
        .btn-oto { background-color: #1971c2; margin-top: 5px; }
        .btn-oto:hover { background-color: #1864ab; }
        .eski-veri { font-size: 12px; color: #868e96; font-style: italic; }
    </style>
<base target="_blank">
</head>
<body>

<div class="container">
    <h1>🌿 Akıllı Tarım Kontrol Paneli</h1>
    <div id="status" class="status-bar disconnected">Yükleniyor...</div>

    <div style="text-align: left; margin-bottom: 25px;">
        <label style="font-weight: bold; color: #495057;">🌱 Hedef Bitki Rejimi:</label>
        <select id="bitkiSecici">
            <option value="Marul">Marul (Kritik Nem: %60)</option>
            <option value="Nane">Nane (Kritik Nem: %55)</option>
            <option value="Fesleğen">Fesleğen (Kritik Nem: %45)</option>
        </select>
        <button onclick="komutGonder()">Rejimi Uygula</button>
    </div>

    <div class="grid">
        <div class="card"><small>Aktif Rejim</small><p id="viewBitki">-</p></div>
        <div class="card" style="border-left-color: #2b8a3e;"><small>Toprak Nemi</small><p id="viewToprak">-%</p><span class="eski-veri" id="toprakZaman"></span></div>
        <div class="card" style="border-left-color: #e63946;"><small>Sıcaklık</small><p id="viewSicaklik">- °C</p><span class="eski-veri" id="sicaklikZaman"></span></div>
        <div class="card" style="border-left-color: #15aabf;"><small>Ortam Nemi</small><p id="viewOrtamNem">-%</p></div>
        <div class="card" style="border-left-color: #f76707; grid-column: span 2;"><small>Su Pompası</small><p id="viewPompa">-</p></div>

        <div id="manuelBildirim" class="manuel-bildirim">
            ⚠️ <strong>Manuel Mod Aktif!</strong> Otomatik sulama devre dışı.
        </div>

        <div class="kontrol-card">
            <strong style="color: #343a40;">🕹️ Manuel Su Pompası Kontrolü:</strong>
            <button class="btn-ac" onclick="manuelPompaKomutu('AC')">💧 Pompayı AÇ</button>
            <button class="btn-kapat" onclick="manuelPompaKomutu('KAPAT')">🛑 Pompayı KAPAT</button>
            <button class="btn-oto" onclick="otomatikModaDon()">🔄 Otomatik Moda Dön</button>
        </div>

        <div class="grafik-card">
            <strong style="color: #1e3c72; display:block; margin-bottom:10px;">📊 Zaman Serisi Grafiği:</strong>
            <canvas id="tarimGrafik" style="width:100%; height:200px;"></canvas>
        </div>

        <div class="yz-card">
            <strong style="color: #d9480f;">🤖 Yapay Zeka Karar Birimi:</strong>
            <p id="viewYz" style="font-size: 14px; margin: 5px 0 0 0; color: #495057; font-style: italic;">Veri bekleniyor...</p>
        </div>
    </div>
</div>

<script>
    // ============================================
    // 1. ÖNCE: localStorage'dan verileri yükle (en güvenli)
    // ============================================
    function localStorageVeriYukle() {
        try {
            const eskiSicaklik = localStorage.getItem('sonSicaklik');
            const eskiNem = localStorage.getItem('sonNem');
            const eskiZaman = localStorage.getItem('sonZaman');
            const eskiBitki = localStorage.getItem('sonBitki');
            const eskiPompa = localStorage.getItem('sonPompa');
            const eskiYz = localStorage.getItem('sonYz');
            const eskiOrtamNem = localStorage.getItem('sonOrtamNem');

            if (eskiSicaklik) {
                document.getElementById("viewSicaklik").innerText = eskiSicaklik + " °C";
                document.getElementById("sicaklikZaman").innerText = "Son görülen: " + (eskiZaman || "bilinmiyor");
            }
            if (eskiNem) {
                document.getElementById("viewToprak").innerText = "%" + eskiNem;
                document.getElementById("toprakZaman").innerText = "Son görülen: " + (eskiZaman || "bilinmiyor");
            }
            if (eskiBitki) document.getElementById("viewBitki").innerText = eskiBitki;
            if (eskiPompa) document.getElementById("viewPompa").innerText = eskiPompa;
            if (eskiOrtamNem) document.getElementById("viewOrtamNem").innerText = "%" + eskiOrtamNem;
            if (eskiYz) document.getElementById("viewYz").innerText = eskiYz + " (Çevrimdışı - son kayıtlı veri)";

            console.log("localStorage verileri yüklendi");
        } catch(e) {
            console.log("localStorage hatası:", e);
        }
    }

    // Hemen çalıştır
    localStorageVeriYukle();

    // ============================================
    // 2. SONRA: Adafruit IO'dan son verileri çek
    // ============================================
    async function eskiVerileriCek() {
        try {
            console.log("Adafruit API'den veri çekiliyor...");

            const sicaklikResponse = await fetch('https://io.adafruit.com/api/v2/iot1436/feeds/sicaklik');
            const nemResponse = await fetch('https://io.adafruit.com/api/v2/iot1436/feeds/toprak-nemi');

            let veriGeldi = false;

            if (sicaklikResponse.ok) {
                const sData = await sicaklikResponse.json();
                const deger = sData.last_value;
                const zaman = new Date(sData.updated_at).toLocaleString('tr-TR');

                document.getElementById("viewSicaklik").innerText = deger + " °C";
                document.getElementById("sicaklikZaman").innerText = "Son güncelleme: " + zaman;

                localStorage.setItem('sonSicaklik', deger);
                localStorage.setItem('sonZaman', zaman);
                veriGeldi = true;
                console.log("Sıcaklık yüklendi:", deger);
            } else {
                console.log("Sıcaklık API hatası:", sicaklikResponse.status);
            }

            if (nemResponse.ok) {
                const nData = await nemResponse.json();
                const deger = nData.last_value;
                const zaman = new Date(nData.updated_at).toLocaleString('tr-TR');

                document.getElementById("viewToprak").innerText = "%" + deger;
                document.getElementById("toprakZaman").innerText = "Son güncelleme: " + zaman;

                localStorage.setItem('sonNem', deger);
                localStorage.setItem('sonZaman', zaman);
                veriGeldi = true;
                console.log("Nem yüklendi:", deger);
            } else {
                console.log("Nem API hatası:", nemResponse.status);
            }

            if (veriGeldi) {
                document.getElementById("viewYz").innerText = "Adafruit IO'dan son veriler yüklendi. Canlı bağlantı bekleniyor...";
                document.getElementById("status").innerText = "Adafruit verileri yüklendi - MQTT bağlantısı bekleniyor...";
            } else {
                document.getElementById("status").innerText = "API'den veri alınamadı - Son kayıtlı veriler gösteriliyor";
            }

        } catch(e) {
            console.log("Adafruit API hatası:", e);
            document.getElementById("status").innerText = "API hatası - Son kayıtlı veriler gösteriliyor";
        }
    }

    // API'den veri çek
    eskiVerileriCek();

    // ============================================
    // 3. GRAFİK (Chart.js)
    // ============================================
    let tarimGrafikNesnesi = null;
    try {
        const ctx = document.getElementById('tarimGrafik').getContext('2d');
        tarimGrafikNesnesi = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Sıcaklık (°C)', data: [], borderColor: '#e63946', backgroundColor: 'transparent', tension: 0.2 },
                    { label: 'Toprak Nemi (%)', data: [], borderColor: '#2b8a3e', backgroundColor: 'transparent', tension: 0.2 }
                ]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
    } catch(e) {
        console.log("Grafik hatası:", e);
    }

    function guncelleGrafik(tip, deger) {
        if (!tarimGrafikNesnesi) return;
        const simdi = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const labels = tarimGrafikNesnesi.data.labels;
        const sicaklikData = tarimGrafikNesnesi.data.datasets[0].data;
        const nemData = tarimGrafikNesnesi.data.datasets[1].data;

        if (labels.length > 7) {
            labels.shift();
            sicaklikData.shift();
            nemData.shift();
        }

        if(labels[labels.length - 1] !== simdi) {
            labels.push(simdi);
        }

        if(tip === 'sicaklik') {
            sicaklikData[labels.length - 1] = parseFloat(deger);
        } else if(tip === 'nem') {
            nemData[labels.length - 1] = parseFloat(deger);
        }
        tarimGrafikNesnesi.update();
    }

    // ============================================
    // 4. MQTT BAĞLANTISI (Hata toleranslı)
    // ============================================
    let client = null;
    let mqttBagli = false;

    function mqttBaslat() {
        try {
            // Paho yüklendi mi kontrol et
            if (typeof Paho === 'undefined' || typeof Paho.MQTT === 'undefined' || typeof Paho.MQTT.Client === 'undefined') {
                console.log("Paho MQTT kütüphanesi yüklenmemiş!");
                document.getElementById("status").innerText = "MQTT kütüphanesi yüklenemedi - Sadece API verileri gösteriliyor";
                document.getElementById("status").className = "status-bar disconnected";
                return;
            }

            client = new Paho.MQTT.Client("broker.hivemq.com", Number(8000), "web_istemci_" + Math.random().toString(16).substr(2, 8));
            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;
            client.connect({onSuccess:onConnect});
            console.log("MQTT bağlantısı başlatıldı");
        } catch(e) {
            console.log("MQTT başlatma hatası:", e);
            document.getElementById("status").innerText = "MQTT başlatılamadı - API verileri aktif";
            document.getElementById("status").className = "status-bar disconnected";
        }
    }

    // Paho yüklenmesini bekle veya hemen dene
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', mqttBaslat);
    } else {
        // Sayfa zaten yüklendiyse, Paho'nun yüklenmesi için kısa bekle
        setTimeout(mqttBaslat, 1000);
    }

    function localStorageVeriKaydet(veri) {
        try {
            if(veri.sicaklik) localStorage.setItem('sonSicaklik', veri.sicaklik);
            if(veri.toprak_nem) localStorage.setItem('sonNem', veri.toprak_nem);
            if(veri.bitki) localStorage.setItem('sonBitki', veri.bitki);
            if(veri.pompa) {
                const pompaText = veri.pompa == "ACIK" ? "💧 SULUYOR (Açık)" : "💤 BEKLEMEDE (Kapalı)";
                localStorage.setItem('sonPompa', pompaText);
            }
            if(veri.ortam_nem) localStorage.setItem('sonOrtamNem', veri.ortam_nem);
            if(veri.yz_mesaj) localStorage.setItem('sonYz', veri.yz_mesaj);
            localStorage.setItem('sonZaman', new Date().toLocaleTimeString('tr-TR'));
        } catch(e) {
            console.log("localStorage kaydetme hatası:", e);
        }
    }

    function onConnect() {
        mqttBagli = true;
        document.getElementById("status").innerText = "Buluta Bağlandı (Canlı)";
        document.getElementById("status").className = "status-bar connected";
        try {
            client.subscribe("akilli_tarim/cihaz_veri"); 
            client.subscribe("iot1436/feeds/sicaklik");
            client.subscribe("iot1436/feeds/toprak-nemi");
            console.log("MQTT abonelikler tamamlandı");
        } catch(e) {
            console.log("Abonelik hatası:", e);
        }
    }

    function onConnectionLost(responseObject) {
        mqttBagli = false;
        document.getElementById("status").innerText = "Bağlantı Koptu! Son veriler gösteriliyor.";
        document.getElementById("status").className = "status-bar disconnected";
        console.log("MQTT bağlantı koptu");
    }

    function onMessageArrived(message) {
        const simdi = new Date().toLocaleTimeString('tr-TR');

        // Adafruit feeds
        if (message.destinationName.includes("feeds/sicaklik")) {
            document.getElementById("viewSicaklik").innerText = message.payloadString + " °C";
            document.getElementById("sicaklikZaman").innerText = "Canlı: " + simdi;
            guncelleGrafik('sicaklik', message.payloadString);
            localStorage.setItem('sonSicaklik', message.payloadString);
            localStorage.setItem('sonZaman', simdi);
            return;
        }
        if (message.destinationName.includes("feeds/toprak-nemi")) {
            document.getElementById("viewToprak").innerText = "%" + message.payloadString;
            document.getElementById("toprakZaman").innerText = "Canlı: " + simdi;
            guncelleGrafik('nem', message.payloadString);
            localStorage.setItem('sonNem', message.payloadString);
            localStorage.setItem('sonZaman', simdi);
            return;
        }

        // ESP32 canlı paket
        try {
            const veri = JSON.parse(message.payloadString);
            localStorageVeriKaydet(veri);

            if(veri.bitki) document.getElementById("viewBitki").innerText = veri.bitki;
            if(veri.toprak_nem) {
                document.getElementById("viewToprak").innerText = "%" + veri.toprak_nem;
                guncelleGrafik('nem', veri.toprak_nem);
            }
            if(veri.sicaklik) {
                document.getElementById("viewSicaklik").innerText = veri.sicaklik + " °C";
                guncelleGrafik('sicaklik', veri.sicaklik);
            }
            if(veri.ortam_nem) document.getElementById("viewOrtamNem").innerText = "%" + veri.ortam_nem;
            if(veri.pompa) {
                const pompaText = veri.pompa == "ACIK" ? "💧 SULUYOR (Açık)" : "💤 BEKLEMEDE (Kapalı)";
                document.getElementById("viewPompa").innerText = pompaText;
            }
            if(veri.yz_mesaj) document.getElementById("viewYz").innerText = veri.yz_mesaj;

            if(veri.manuel_mod === true) {
                document.getElementById("manuelBildirim").style.display = "block";
                document.getElementById("viewPompa").innerText += " (MANUEL)";
            } else {
                document.getElementById("manuelBildirim").style.display = "none";
            }
        } catch(e) {
            console.log("JSON hatası:", e);
        }
    }

    function komutGonder() {
        if (!client || !mqttBagli) {
            alert("MQTT bağlantısı yok! Komut gönderilemiyor.");
            return;
        }
        try {
            const secilen = document.getElementById("bitkiSecici").value;
            const jsonKomut = JSON.stringify({ komut_bitki: secilen });
            const message = new Paho.MQTT.Message(jsonKomut);
            message.destinationName = "akilli_tarim/web_komut";
            client.send(message);
            alert(secilen + " rejimi gönderildi!");
        } catch(e) {
            console.log("Komut gönderme hatası:", e);
            alert("Komut gönderilemedi!");
        }
    }

    function manuelPompaKomutu(durum) {
        if (!client || !mqttBagli) {
            alert("MQTT bağlantısı yok! Komut gönderilemiyor.");
            return;
        }
        try {
            const jsonKomut = JSON.stringify({ pompa_komut: durum });
            const message = new Paho.MQTT.Message(jsonKomut);
            message.destinationName = "akilli_tarim/web_komut";
            client.send(message);
            alert(durum === 'AC' ? "Pompa AÇILDI (Manuel mod aktif!)" : "Pompa KAPATILDI (Manuel mod aktif!)");
        } catch(e) {
            console.log("Komut gönderme hatası:", e);
            alert("Komut gönderilemedi!");
        }
    }

    function otomatikModaDon() {
        if (!client || !mqttBagli) {
            alert("MQTT bağlantısı yok! Komut gönderilemiyor.");
            return;
        }
        try {
            const jsonKomut = JSON.stringify({ mod: "otomatik" });
            const message = new Paho.MQTT.Message(jsonKomut);
            message.destinationName = "akilli_tarim/web_komut";
            client.send(message);
            alert("Otomatik sulama moduna geçildi!");
        } catch(e) {
            console.log("Komut gönderme hatası:", e);
            alert("Komut gönderilemedi!");
        }
    }
</script>
</body>
</html>
